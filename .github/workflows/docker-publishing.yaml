###
### This workflow builds true multi-platform container images for:
###     * linux/amd64 (x86_64 servers)
###     * linux/arm64 (Raspberry Pi 3/4/5 64-bit)
###     * linux/arm/v7 (Raspberry Pi 2/3/4 32-bit)
###
### It is triggered manually by workflow_dispatch, on release, or via openssh-updated event.
### Multi-arch manifest lists are published to GHCR and Docker Hub:
###     ghcr.io/{org}/{repo}:latest & {version}
###     netwatchteam/netwatch_ssh-attackpod:latest & {version}
###
name: Multi arch container image build
on:
  repository_dispatch:
    types: [openssh-updated]
  workflow_dispatch:
    inputs:
      image_tag_version:
        required: true
        description: The semver image tag for the resulting container images
        default: "9.6"
      override_latest:
        required: true
        description: Whether the resulting image should overwrite the "latest" tags
        default: "true"

  release:
    types: [released]

permissions:
  contents: read
  packages: write

jobs:
  test:
    name: Integration Tests (amd64)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build local amd64 image for integration tests
        uses: docker/build-push-action@v6
        with:
          context: src
          file: src/Dockerfile
          platforms: linux/amd64
          tags: netwatch_ssh-attackpod:test
          load: true
          push: false

      - name: Run integration tests
        env:
          DOCKER_IMAGE_FQN: netwatch_ssh-attackpod:test
        run: |
          python -m pip install --upgrade pip
          pip install -r tests/requirements.txt
          pytest tests/

  publish:
    name: Build & Push Multi-Platform Manifests
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Determine Image Version & Tags
        id: meta
        env:
          DH_USER_RAW: ${{ secrets.DOCKERHUB_USERNAME }}
          DH_TOKEN_RAW: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          version=""
          if [ "${{ github.event_name }}" == "repository_dispatch" ]; then
              version="${{ github.event.client_payload.version }}"
          elif [ -n "${{ github.event.inputs.image_tag_version }}" ]; then
              version="${{ github.event.inputs.image_tag_version }}"
          else
              version="${{ github.ref_name }}"
          fi

          if [ -z "$version" ]; then
              version="9.6"
          fi

          # Sanitize version string for valid Docker tag syntax
          version=$(echo "$version" | sed -E 's/^[0-9]+://; s/[^a-zA-Z0-9_.-]/_/g')

          repo="${{ github.repository }}"
          repo_lower="${repo,,}"

          # Clean and sanitize Docker Hub secret credentials (strip newlines, carriage returns, leading/trailing spaces, and header prefixes)
          DH_USER=$(echo -n "$DH_USER_RAW" | tr -d '\r\n' | xargs)
          DH_TOKEN=$(echo -n "$DH_TOKEN_RAW" | tr -d '\r\n' | sed -E 's/^(Bearer|Basic)[[:space:]]+//i' | xargs)

          has_dh="false"
          if [ -n "$DH_USER" ] && [ -n "$DH_TOKEN" ]; then
              has_dh="true"
              echo "::add-mask::$DH_TOKEN"
          fi

          echo "has_dockerhub=${has_dh}" >> $GITHUB_OUTPUT
          echo "dh_username=${DH_USER}" >> $GITHUB_OUTPUT
          echo "dh_token=${DH_TOKEN}" >> $GITHUB_OUTPUT

          echo "TAGS<<EOF" >> $GITHUB_OUTPUT
          echo "ghcr.io/${repo_lower}:${version}" >> $GITHUB_OUTPUT
          echo "ghcr.io/${repo_lower}:latest" >> $GITHUB_OUTPUT
          if [ "$has_dh" = "true" ]; then
              echo "netwatchteam/netwatch_ssh-attackpod:${version}" >> $GITHUB_OUTPUT
              echo "netwatchteam/netwatch_ssh-attackpod:latest" >> $GITHUB_OUTPUT
          fi
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Docker Hub
        if: steps.meta.outputs.has_dockerhub == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ steps.meta.outputs.dh_username }}
          password: ${{ steps.meta.outputs.dh_token }}

      - name: Build and Push Multi-Platform Manifest Index
        uses: docker/build-push-action@v6
        with:
          context: src
          file: src/Dockerfile
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          push: true
          tags: ${{ steps.meta.outputs.TAGS }}
