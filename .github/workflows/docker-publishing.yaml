###
### This workflow builds true multi-platform container images for:
###     * linux/amd64 (x86_64 servers)
###     * linux/arm64 (Raspberry Pi 3/4/5 64-bit)
###     * linux/arm/v7 (Raspberry Pi 2/3/4 32-bit)
###
### It is triggered manually by workflow_dispatch, on release, or via openssh-updated event.
### Multi-arch manifest lists are published to both GHCR and Docker Hub:
###     ghcr.io/{org}/{repo}:latest & {version}
###     netwatchteam/netwatch_ssh-attackpod:latest & {version}
###
name: Multi arch container image build
on:
  repository_dispatch:
    types: [openssh-updated]
  workflow_dispatch:
    inputs:
      image_tag_version:
        required: true
        description: The semver image tag for the resulting container images
      override_latest:
        required: true
        description: Whether the resulting image should overwrite the "latest" tags
        default: "true"

  release:
    types: [released]

jobs:
  test:
    name: Integration Tests (amd64)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build local amd64 image for integration tests
        uses: docker/build-push-action@v6
        with:
          context: src
          file: src/Dockerfile
          platforms: linux/amd64
          tags: netwatch_ssh-attackpod:test
          load: true
          push: false

      - name: Run integration tests
        env:
          DOCKER_IMAGE_FQN: netwatch_ssh-attackpod:test
        run: |
          python -m pip install --upgrade pip
          pip install -r tests/requirements.txt
          pytest tests/

  publish:
    name: Build & Push Multi-Platform Manifests
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Determine Image Version
        id: meta
        run: |
          version=""
          if [ "${{ github.event_name }}" == "repository_dispatch" ]; then
              version="${{ github.event.client_payload.version }}"
          elif [ -n "${{ github.event.inputs.image_tag_version }}" ]; then
              version="${{ github.event.inputs.image_tag_version }}"
          else
              version="${{ github.ref_name }}"
          fi

          if [ -z "$version" ]; then
              echo "Image tag version could not be determined"
              exit 1
          fi

          repo="${{ github.repository }}"
          echo "VERSION=$version" >> $GITHUB_OUTPUT
          echo "REPO_LOWER=${repo,,}" >> $GITHUB_OUTPUT

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Docker Hub
        if: ${{ env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != '' }}
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Multi-Platform Manifest Index
        uses: docker/build-push-action@v6
        with:
          context: src
          file: src/Dockerfile
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          push: true
          tags: |
            ghcr.io/${{ steps.meta.outputs.REPO_LOWER }}:${{ steps.meta.outputs.VERSION }}
            ghcr.io/${{ steps.meta.outputs.REPO_LOWER }}:latest
            netwatchteam/netwatch_ssh-attackpod:${{ steps.meta.outputs.VERSION }}
            netwatchteam/netwatch_ssh-attackpod:latest
