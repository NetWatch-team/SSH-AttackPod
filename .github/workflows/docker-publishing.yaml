###
### This workflow creates container images for
###     * amd64
###     * arm64 (Raspberry Pi 3/4/5 64-bit)
###     * armv7 (Raspberry Pi 2/3/4 32-bit)
### architectures.
###
### It's triggered either manually by a workflow_dispatch using GitHub Actions UI,
### automatically when a new GitHub release is created, or when openssh is updated.
###
### Resulting container images are published to both GHCR and Docker Hub:
###     ghcr.io/{org}/{repo}:{version}-{architecture}
###     ghcr.io/{org}/{repo}:latest-{architecture}
###     netwatchteam/netwatch_ssh-attackpod:{version}-{architecture}
###     netwatchteam/netwatch_ssh-attackpod:latest-{architecture}
###
name: Multi arch container image build
on:
  repository_dispatch:
    types: [openssh-updated]
  workflow_dispatch:
    inputs:
      image_tag_version:
        required: true
        description: The semver image tag for the resulting container images
      override_latest:
        required: true
        description: Whether the resulting image should overwrite the "latest" tags
        default: "true"

  release:
    types: [released]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
          - arch: arm64
            platform: linux/arm64
          - arch: armv7
            platform: linux/arm/v7
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          platforms: ${{ matrix.platform }}

      - name: Build image repo name
        run: |
          version=""
          if [ "${{ github.event_name }}" == "repository_dispatch" ]; then
              version="${{ github.event.client_payload.version }}"
          elif [ -n "${{ github.event.inputs.image_tag_version }}" ]; then
              version="${{ github.event.inputs.image_tag_version }}"
          else
              version="${{ github.ref_name }}"
          fi

          if [ -z "$version" ]; then
              echo "Image tag version could not be determined"
              exit 1
          fi

          repo="${{ github.repository }}"
          echo VERSIONED_GHCR_IMAGE="ghcr.io/${repo,,}:$version-${{ matrix.arch }}" >> $GITHUB_ENV
          echo LATEST_GHCR_IMAGE="ghcr.io/${repo,,}:latest-${{ matrix.arch }}" >> $GITHUB_ENV
          echo VERSIONED_DOCKERHUB_IMAGE="netwatchteam/netwatch_ssh-attackpod:$version-${{ matrix.arch }}" >> $GITHUB_ENV
          echo LATEST_DOCKERHUB_IMAGE="netwatchteam/netwatch_ssh-attackpod:latest-${{ matrix.arch }}" >> $GITHUB_ENV

      - name: Docker build
        uses: docker/build-push-action@v6
        with:
          context: src
          file: src/Dockerfile
          platforms: ${{ matrix.platform }}
          tags: |
            ${{ env.VERSIONED_GHCR_IMAGE }}
            ${{ env.LATEST_GHCR_IMAGE }}
            ${{ env.VERSIONED_DOCKERHUB_IMAGE }}
            ${{ env.LATEST_DOCKERHUB_IMAGE }}
          load: true
          push: false

      - name: Run integration tests
        env:
          DOCKER_IMAGE_FQN: ${{ env.VERSIONED_GHCR_IMAGE }}
        run: |
          # Install dependencies
          python -m pip install --upgrade pip
          pip install -r tests/requirements.txt

          # Run python based integration tests via pytest
          pytest tests/

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Docker Hub
        if: ${{ secrets.DOCKERHUB_USERNAME != '' && secrets.DOCKERHUB_TOKEN != '' }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker push to GHCR and Docker Hub
        run: |
          # Push to GHCR
          docker push "$VERSIONED_GHCR_IMAGE"
          docker push "$LATEST_GHCR_IMAGE"

          # Push to Docker Hub if logged in
          if docker info | grep -q "Username"; then
            docker push "$VERSIONED_DOCKERHUB_IMAGE"
            docker push "$LATEST_DOCKERHUB_IMAGE"
          fi
